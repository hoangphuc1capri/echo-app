<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary gradient - warm wood tones -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C4033"/>
      <stop offset="100%" stop-color="#3D2B22"/>
    </linearGradient>
    
    <!-- Secondary gradient - golden amber -->
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#A68520"/>
    </linearGradient>
    
    <!-- Forest green gradient -->
    <linearGradient id="forestGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2D5016"/>
      <stop offset="100%" stop-color="#4A7C23"/>
    </linearGradient>
    
    <!-- Echo wave gradient -->
    <linearGradient id="echoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C4033" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#C9A227" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5C4033" stop-opacity="0.8"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2C1810" flood-opacity="0.15"/>
    </filter>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#primaryGrad)" filter="url(#shadow)"/>
  
  <!-- Inner circle - lighter -->
  <circle cx="256" cy="256" r="200" fill="#FAF6F0"/>
  
  <!-- Echo waves (representing the ECHO name) -->
  <g opacity="0.6">
    <ellipse cx="256" cy="280" rx="180" ry="80" stroke="url(#echoGrad)" stroke-width="3" fill="none" stroke-dasharray="8 4"/>
    <ellipse cx="256" cy="280" rx="140" ry="60" stroke="url(#echoGrad)" stroke-width="2.5" fill="none" stroke-dasharray="6 3"/>
    <ellipse cx="256" cy="280" rx="100" ry="40" stroke="url(#echoGrad)" stroke-width="2" fill="none" stroke-dasharray="4 2"/>
  </g>
  
  <!-- Tree trunk - representing roots/independence -->
  <path d="M246 320 L246 240 Q256 220 256 220 Q256 220 266 240 L266 320 Z" fill="url(#primaryGrad)"/>
  
  <!-- Main tree canopy - healthy green -->
  <g filter="url(#glow)">
    <!-- Left branch -->
    <path d="M256 260 Q220 240 200 200" stroke="url(#primaryGrad)" stroke-width="8" stroke-linecap="round" fill="none"/>
    
    <!-- Right branch -->
    <path d="M256 260 Q292 240 312 200" stroke="url(#primaryGrad)" stroke-width="8" stroke-linecap="round" fill="none"/>
    
    <!-- Center branch up -->
    <path d="M256 240 Q256 200 256 160" stroke="url(#primaryGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
    
    <!-- Small branches -->
    <path d="M256 220 Q240 190 225 170" stroke="url(#primaryGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M256 220 Q272 190 287 170" stroke="url(#primaryGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Tree leaves (canopy) - representing AI support -->
  <g fill="url(#forestGrad)">
    <!-- Large leaf clusters -->
    <circle cx="200" cy="195" r="35"/>
    <circle cx="312" cy="195" r="35"/>
    <circle cx="256" cy="145" r="40"/>
    
    <!-- Smaller accent leaves -->
    <circle cx="225" cy="165" r="20"/>
    <circle cx="287" cy="165" r="20"/>
    <circle cx="256" cy="180" r="25"/>
    
    <!-- Highlight leaves -->
    <circle cx="185" cy="200" r="12" fill="#4A7C23" opacity="0.7"/>
    <circle cx="320" cy="200" r="12" fill="#4A7C23" opacity="0.7"/>
    <circle cx="256" cy="135" r="15" fill="#4A7C23" opacity="0.7"/>
  </g>
  
  <!-- Golden accent dots - representing growth/fruits -->
  <g fill="#C9A227">
    <circle cx="256" cy="130" r="6"/>
    <circle cx="195" cy="185" r="4"/>
    <circle cx="317" cy="185" r="4"/>
    <circle cx="256" cy="165" r="5"/>
  </g>
  
  <!-- Floating echo particles -->
  <g fill="#5C4033" opacity="0.4">
    <circle cx="160" cy="140" r="3"/>
    <circle cx="352" cy="140" r="3"/>
    <circle cx="140" cy="220" r="2"/>
    <circle cx="372" cy="220" r="2"/>
    <circle cx="180" cy="300" r="2.5"/>
    <circle cx="332" cy="300" r="2.5"/>
  </g>
</svg>
